<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI 新用户福利 · 扫码直达</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}html{-webkit-font-smoothing:antialiased}
:root{--bg:oklch(100% 0 0);--card:oklch(99% 0 0);--text:oklch(12% .01 250);--dim:oklch(42% .01 250);--accent:oklch(52% .18 250);--bdr:oklch(88% .008 250);--warn:oklch(55% .18 35)}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans SC',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.4}
.page{width:750px;margin:0 auto;padding:32px 36px 20px}
.hd{text-align:center;padding-bottom:18px;border-bottom:2px solid var(--bdr);margin-bottom:14px}
.hd-k{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin-bottom:4px}
.hd h1{font-size:26px;font-weight:700;letter-spacing:-.02em}
.hd-sub{font-size:11px;color:var(--dim);margin-top:3px}
.stats{display:flex;justify-content:center;gap:40px;padding:12px 0;border-bottom:1px solid var(--bdr);margin-bottom:10px}
.stats b{font-size:20px;font-weight:700;color:var(--accent)} .stats span{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--dim);display:block}
.dl{text-align:center;font-size:10px;color:var(--warn);margin-bottom:12px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;background:var(--bdr);margin-bottom:14px;border:2px solid var(--bdr)}
.card{background:var(--card);padding:18px 18px 14px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:8px}
.card-idx{font-size:9px;font-weight:700;letter-spacing:.12em;color:var(--dim);text-transform:uppercase}
.card-name{font-size:14px;font-weight:650;letter-spacing:-.01em}
.card-name em{font-size:8px;font-weight:700;font-style:normal;letter-spacing:.04em;text-transform:uppercase;border:1px solid var(--accent);color:var(--accent);padding:1px 4px;margin-left:5px;vertical-align:2px}
.card-co{font-size:9px;color:var(--dim)} .card-bf{font-size:10px;color:var(--dim);line-height:1.35;max-width:280px}
.card-qr{margin:0 auto} .card-qr svg{width:150px;height:150px;display:block} .card-qr-lbl{font-size:9px;color:var(--dim);margin-top:2px}
.ft{text-align:center;padding:16px 0 8px;font-size:10px;color:var(--dim);border-top:2px solid var(--bdr)}
</style>
</head><body><div class="page">
<header class="hd"><div class="hd-k">AI Free Credits · Screenshot & Share</div>
<h1>AI 新用户福利合集</h1>
<div class="hd-sub" id="subtitle"></div>
</header>
<div class="stats"><div><b>$total</b><span>优质平台</span></div><div><b>¥0</b><span>全部免费</span></div><div><b>$glm_count</b><span>GLM-5.2</span></div></div>
<div class="dl" id="deadlineBar"></div>
<div class="grid" id="cardGrid"></div>
<footer class="ft">截屏分享给朋友 · 长按二维码识别直达各平台 · $updated_at</footer>
</div>
<script type="application/json" id="qrData">
$_qr_data_json
</script>
<script>
(function(){
  var PLATFORMS = $_platforms_json;
  var QRS = JSON.parse(document.getElementById('qrData').textContent);

  function fmtDate(s) {
    if (!s) return "";
    var d = new Date(s);
    if (isNaN(d.getTime())) return s;   // 非 ISO 日期直接展示原文
    return d.getFullYear() + "." + String(d.getMonth()+1).padStart(2,'0') + "." + String(d.getDate()).padStart(2,'0');
  }
  function esc(s) { return (s||"").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function highlight(benefit, highlights) {
    if (!benefit) return '';
    if (!highlights || !highlights.length) return esc(benefit);
    var escaped = esc(benefit);
    highlights.forEach(function(hl) {
      if (!hl) return;
      var escHl = esc(hl);
      var re = new RegExp(escHl.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g');
      escaped = escaped.replace(re, '<b>' + escHl + '</b>');
    });
    return escaped;
  }

  var names = PLATFORMS.map(function(p){ return p.name; }).filter(function(v,i,a){ return a.indexOf(v)===i; });
  document.getElementById("subtitle").textContent = names.join(" · ") + " | 截屏分享 · 长按扫码";

  var deadlines = PLATFORMS.filter(function(p){ return p.deadline; }).map(function(p){
    return fmtDate(p.deadline) + " 前有效";
  });
  document.getElementById("deadlineBar").textContent = deadlines.length ? "⏰ " + deadlines.join(" · ") : "";

  var grid = document.getElementById("cardGrid");
  var html = "";
  PLATFORMS.forEach(function(p, i) {
    var tags = (p.tags||[]).map(function(t){ return "<em>"+esc(t)+"</em>"; }).join("");
    html += '<div class="card">'
      + '<div class="card-idx">' + String(i+1).padStart(2,'0') + '</div>'
      + '<div class="card-name">' + esc(p.name) + tags + '</div>'
      + '<div class="card-co">' + esc(p.provider||"") + '</div>'
      + '<div class="card-bf">🎁 ' + highlight(p.benefit||"", p.benefit_highlight) + '</div>'
      + '<div class="card-qr">' + (QRS[p.id] || '') + '</div>'
      + '<div class="card-qr-lbl">扫码直达 →</div>'
      + '</div>';
  });
  grid.innerHTML = html;
})();
</script>
</body></html>
