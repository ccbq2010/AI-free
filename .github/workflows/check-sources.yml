name: Check New Sources

on:
  schedule:
    # Every Thursday at 10:00 CST (02:00 UTC)
    - cron: '0 2 * * 4'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run multi-source scanner
        id: check
        continue-on-error: true
        run: |
          python scripts/check_sources.py --output data/last_scan.json 2>&1 | tee /tmp/check-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Run LLM extraction (if candidates found)
        if: steps.check.outputs.exit_code == '1'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 从 JSON 文件中读取 new_candidates（不再解析 stdout）
          python -c "
          import json
          report = json.load(open('data/last_scan.json'))
          candidates = report.get('new_candidates', [])
          json.dump(candidates, open('/tmp/candidates.json', 'w'), ensure_ascii=False)
          print(f'{len(candidates)} candidates to process')
          "
          # 调用 LLM 抽取（需要 GitHub Models 额度）
          if [ -s /tmp/candidates.json ]; then
            python scripts/extract_with_llm.py < /tmp/candidates.json > /tmp/extracted.json 2>&1 || true
          fi

      - name: Run expiry check
        continue-on-error: true
        run: |
          python scripts/check_expiry.py 2>&1 | tee /tmp/expiry-output.txt
          echo "expiry_exit_code=$?" >> "$GITHUB_ENV"

      - name: Upload expiry report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: expiry-report
          path: data/expiry_report.json
          retention-days: 30

      - name: Create issue if new candidates
        if: steps.check.outputs.exit_code == '1'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const today = new Date().toISOString().slice(0, 10);

            let body = '## 🤖 自动巡检发现新候选平台\n\n';

            // 优先使用 LLM 抽取结果
            try {
              const extracted = JSON.parse(fs.readFileSync('/tmp/extracted.json', 'utf8'));
              if (extracted.length > 0) {
                body += '### LLM 结构化抽取结果\n\n';
                body += '| 名称 | 福利 | 置信度 | 链接 |\n';
                body += '|------|------|--------|------|\n';
                for (const item of extracted.slice(20)) {
                  const name = item.name || '?';
                  const benefit = (item.benefit || '').replace(/\|/g, '/').slice(0, 60);
                  const conf = (item.confidence || 0).toFixed(2);
                  const url = item.url || item._original_url || '';
                  body += `| ${name} | ${benefit} | ${conf} | [链接](${url}) |\n`;
                }
                body += '\n';
              }
            } catch(e) {
              // 回退到 JSON 报告文件
              try {
                const report = JSON.parse(fs.readFileSync('data/last_scan.json', 'utf8'));
                const cands = (report.new_candidates || []).slice(0, 15);
                body += '### 原始候选（LLM 抽取失败）\n\n';
                for (const c of cands) {
                  body += `- **${c.name}** — ${(c.benefit || '').slice(0, 80)} (${c.source})\n';
                }
              } catch(e2) {
                body += '_解析报告失败，请手动检查 CI 日志。_\n';
              }
            }

            // 过期检查摘要（如果有问题）
            try {
              const expiry = JSON.parse(fs.readFileSync('data/expiry_report.json', 'utf8'));
              if (expiry.issues && expiry.issues.length > 0) {
                body += '\n### ⚠️ 过期/异常检查\n\n';
                for (const issue of expiry.issues.slice(10)) {
                  body += `- **${issue.name}**: ${issue.issue} (${issue.detail})\n`;
                }
                body += '\n';
              }
            } catch(e) { /* 忽略 */ }

            body += '\n### 操作说明\n';
            body += '- 回复 `/accept <平台名>` 添加到 platforms.json\n';
            body += '- 回复 `/reject <平台名>` 加入黑名单\n';
            body += '- 30 天无响应自动关闭\n';

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🤖 发现新的免费 AI 资源 (' + today + ')',
              body: body,
              labels: ['bot', 'content-update']
            });
