name: Check Expiry

on:
  schedule:
    # Every Monday at 09:00 CST (01:00 UTC), 比 build 晚 1 小时
    - cron: '0 1 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run expiry scanner
        id: check
        continue-on-error: true
        run: |
          python scripts/check_expiry.py 2>&1 | tee /tmp/expiry-output.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Create issue if issues found
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # 脚本内部会判断 issues_found，无问题则自动跳过
        run: python scripts/create_issue.py --mode expiry
