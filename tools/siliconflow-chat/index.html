<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SiliconFlow AI Chat</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f0f10;--surface:#1a1a1c;--surface2:#242428;--border:#2e2e32;
  --text:#e4e4e7;--dim:#8b8b90;--accent:#6366f1;--accent-hover:#818cf8;
  --user-bg:#3b3b5c;--bot-bg:#1a1a1c;
}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column}
.header{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:1.1rem;font-weight:600}
.header-sub{font-size:.75rem;color:var(--dim);margin-top:2px}
.config-bar{padding:12px 24px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;gap:12px;flex-wrap:wrap;align-items:center}
 input,select{padding:8px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:.85rem}
 input:focus,select:focus{outline:0;border-color:var(--accent)}
 input{flex:1;min-width:200px}
 select{min-width:180px}
 .btn{padding:8px 16px;border-radius:6px;background:var(--accent);color:#fff;border:0;font-size:.85rem;font-weight:500;cursor:pointer;white-space:nowrap}
 .btn:hover{background:var(--accent-hover)}
 .btn:disabled{opacity:.5;cursor:not-allowed}
.chat{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px}
.msg{max-width:760px;line-height:1.7;font-size:.925rem}
.msg-user{align-self:flex-end;background:var(--user-bg);padding:12px 18px;border-radius:16px 16px 4px 16px}
.msg-bot{align-self:flex-start;background:var(--bot-bot);padding:16px 20px;border:1px solid var(--border);border-radius:16px 16px 16px 4px;width:100%}
.msg-role{font-size:.7rem;color:var(--dim);margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.typing{display:flex;gap:4px;padding:16px 20px;align-self:flex-start}
.typing span{width:6px;height:6px;background:var(--dim);border-radius:50%;animation:blink 1.4s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,60%,100%{opacity:.3}30%{opacity:1}}
.input-area{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:12px;align-items:flex-end}
textarea{flex:1;padding:12px 16px;border-radius:12px;border:1px solid var(--border);background:var(--surface);color:var(--text);resize:none;font-size:.9rem;line-height:1.5;font-family:inherit}
textarea:focus{outline:0;border-color:var(--accent)}
textarea::placeholder{color:var(--dim)}
.send-btn{padding:12px 24px;font-size:.9rem}
.status-bar{padding:6px 24px;font-size:.75rem;color:var(--dim);text-align:center}
.status-bar.error{color:#ef4444}
.status-bar.success{color:#22c55e}
</style>
</head>
<body>
<div class="header">
  <div><h1>⚡ SiliconFlow AI Chat</h1><div class="header-sub">国内直连 · 无需代理 · 隐私安全（Key 存在本地）</div></div>
</div>
<div class="config-bar">
  <input type="password" id="apiKey" placeholder="输入 SiliconFlow API Key（sk-...）">
  <select id="model">
    <option value="deepseek-ai/DeepSeek-V3.2">DeepSeek V3.2（推荐）</option>
    <option value="Qwen/Qwen3.5-27B">Qwen 3.5 27B（中文最强）</option>
    <option value="deepseek-ai/DeepSeek-R1">DeepSeek R1（推理）</option>
    <option value="Qwen/Qwen3-Coder-30B-A3B-Instruct">Qwen Coder（编程）</option>
    <option value="zai-org/GLM-4.5-Air">GLM-4.5 Air</option>
    <option value="inclusionAI/Ling-flash-2.0">Ling Flash（极速）</option>
    <option value="Qwen/Qwen3-VL-32B-Instruct">Qwen VL 32B（视觉）</option>
    <option value="Qwen/Qwen2.5-72B-Instruct">Qwen 2.5 72B</option>
    <option value="Wan-AI/Wan2.2-T2V-A14B">Wan（视频生成）</option>
    <option value="Qwen/Qwen-Image">Qwen Image（文生图）</option>
  </select>
</div>
<div class="chat" id="chat"></div>
<div class="status-bar" id="status">Enter API Key and press Send</div>
<div class="input-area">
  <textarea id="input" placeholder="输入问题... Enter 发送 · Shift+Enter 换行" rows="2"></textarea>
  <button class="btn send-btn" id="send">发送</button>
</div>
<script>
const $=id=>document.getElementById(id);
const chat=$('chat'),input=$('input'),send=$('send'),apiKey=$('apiKey'),model=$('model'),statusEl=$('status');

// Load cached key
const cached=localStorage.getItem('sf_key');
if(cached)apiKey.value=cached;

function setStatus(msg,type){statusEl.textContent=msg;statusEl.className='status-bar'+(type?' '+type:''}

function addMsg(role,content,thinking){
  const div=document.createElement('div');
  div.className='msg msg-'+role;
  let html=`<div class="msg-role">${role==='user'?'You':'AI'}</div>`;
  if(thinking)html+=`<details open><summary>思考过程</summary><div style="color:var(--dim);font-size:.85rem;margin-top:8px">${thinking}</div></details>`;
  html+=content.replace(/\n/g,'<br>');
  div.innerHTML=html;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
  return div;
}

function addTyping(){
  const div=document.createElement('div');
  div.className='typing';div.id='typing';
  div.innerHTML='<span></span><span></span><span></span>';
  chat.appendChild(div);chat.scrollTop=chat.scrollHeight;
}

function removeTyping(){const t=document.getElementById('typing');if(t)t.remove();}

async function chat(){
  const key=apiKey.value.trim();
  const text=input.value.trim();
  if(!key){setStatus('请输入 API Key','error');return}
  if(!text){return}
  localStorage.setItem('sf_key',key);
  
  addMsg('user',text);
  input.value='';
  addTyping();
  send.disabled=true;
  setStatus('正在请求...');

  try{
    const res=await fetch('https://api.siliconflow.cn/v1/chat/completions',{
      method:'POST',
      headers:{'Authorization':`Bearer ${key}`,'Content-Type':'application/json'},
      body:JSON.stringify({
        model:model.value,
        messages:[{role:'user',content:text}],
        stream:false,
        max_tokens:2048
      })
    });

    removeTyping();

    if(!res.ok){
      const err=await res.json().catch(()=>({}));
      addMsg('bot',`❌ 错误 ${res.status}: ${err.error?.message||res.statusText}`);
      setStatus('请求失败','error');
    }else{
      const data=await res.json();
      const content=data.choices?.[0]?.message?.content||'无响应';
      addMsg('bot',content);
      setStatus(`Done · 模型: ${model.value.split('/').pop()}`,'success');
    }
  }catch(e){
    removeTyping();
    addMsg('bot',`❌ 网络错误: ${e.message}<br><br>可能原因:<br>1. SiliconFlow API 暂时不通<br>2. Key 过期或无效`);
    setStatus('网络失败','error');
  }

  send.disabled=false;
  input.focus();
}

send.onclick=chat;
input.onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();chat()}};

// Image generation
async function genImage(){
  const key=apiKey.value.trim();
  const prompt=prompt('输入图片描述:');
  if(!key||!prompt)return;
  addMsg('user','🎨 生成图片: '+prompt);
  addTyping();
  try{
    const res=await fetch('https://api.siliconflow.cn/v1/images/generations',{
      method:'POST',
      headers:{'Authorization':`Bearer ${key}`,'Content-Type':'application/json'},
      body:JSON.stringify({model:'Qwen/Qwen-Image',prompt,prompt_enhance:true,size:'1024x1024',batch_size:1, num_inference_steps:50})
    });
    removeTyping();
    const data=await res.json();
    if(data.data&&data.data[0])addMsg('bot','<img src="'+data.data[0].url+'" style="max-width:100%;border-radius:12px;margin-top:8px">');
    else addMsg('bot','❌ '+JSON.stringify(data));
  }catch(e){removeTyping();addMsg('bot','❌ '+e.message);}
}

// Quick action buttons
const bar=document.createElement('div');
bar.style.cssText='padding:8px 24px;display:flex;gap:8px;flex-wrap:wrap;border-bottom:1px solid var(--border)';
bar.innerHTML='<button class="btn" style="padding:4px 12px;font-size:.75rem;background:var(--surface2);color:var(--text)" onclick="genImage()">🎨 生图</button>';
document.body.insertBefore(bar,document.querySelector('.chat'));

input.focus();
</script>
</body>
</html>
