  function fmtDate(s) {
    if (!s) return "";
    var d = new Date(s);
    if (isNaN(d.getTime())) return s;   // 非 ISO 日期直接展示原文
    return d.getFullYear() + "." + String(d.getMonth()+1).padStart(2,'0') + "." + String(d.getDate()).padStart(2,'0');
  }
  function esc(s) { return (s||"").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function highlight(benefit, highlights) {
    if (!benefit) return '';
    if (!highlights || !highlights.length) return esc(benefit);
    var escaped = esc(benefit);
    highlights.forEach(function(hl) {
      if (!hl) return;
      var escHl = esc(hl);
      var re = new RegExp(escHl.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g');
      escaped = escaped.replace(re, '<b>' + escHl + '</b>');
    });
    return escaped;
  }
